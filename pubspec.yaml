name: healthsphere_admin
description: HealthSphere Web Admin Panel for Admin, Doctor, Ambulance, Medicine roles
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ✅ Firebase Core + Services
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.5
  cloud_firestore: ^4.17.3
  firebase_storage: ^11.2.6
  intl: ^0.18.1
  image_picker: ^1.0.4
  pdf: ^3.10.4
  printing: ^5.12.0

  # ✅ UI Utilities
  flutter_spinkit: ^5.2.0
  google_fonts: ^6.1.0

  # ✅ Web Image Picker (if you want upload support later)
  image_picker_web: ^3.1.1

  # ✅ Navigation and Snackbar
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - lib/assets/logo.png
